<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - AmazeCart</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .cart-container {
      display: flex;
      gap: 30px;
      margin-top: 40px;
      margin-bottom: 60px;
    }
    
    .cart-items {
      flex: 2;
    }
    
    .cart-summary {
      flex: 1;
      background: var(--surface-color);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      height: fit-content;
      position: sticky;
      top: 100px;
    }
    
    .cart-item {
      display: flex;
      gap: 20px;
      padding: 20px;
      background: var(--surface-color);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
      align-items: center;
    }
    
    .cart-item img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }
    
    .cart-item-details {
      flex: 1;
    }
    
    .cart-item-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .cart-item-price {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 15px;
    }

    .cart-item-meta {
      color: var(--text-secondary);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
    }
    
    .remove-btn {
      color: var(--error-color);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
    }
    
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      color: var(--text-secondary);
    }
    
    .summary-total {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid var(--border-color);
      font-size: 20px;
      font-weight: bold;
      color: var(--text-primary);
    }

    .cart-item-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }
    
  </style>
</head>
<body>

  <header>
    <div class="container top-bar">
      <a href="index.html" class="logo">
        <i class="fas fa-shopping-cart"></i>
        <span>AmazeCart</span>
      </a>
      
      <div class="nav-icons">
        <div class="controls">
          <button id="theme-toggle" class="theme-toggle">
            <i class="fas fa-moon"></i> Dark Mode
          </button>
        </div>
        <a href="wishlist.html" class="nav-icon" title="Wishlist">
          <i class="fas fa-heart"></i>
          <span class="badge wishlist-count">0</span>
        </a>
        <a href="cart.html" class="nav-icon" title="Cart">
          <i class="fas fa-shopping-bag"></i>
          <span class="badge cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="container">
    <h2 style="margin-top: 30px;">Shopping Cart</h2>
    
    <div class="cart-container">
      <div class="cart-items">
        <div id="cart-items-list"></div>
        <div id="cart-empty-state" class="empty-state" style="display: none;">
          <i class="fas fa-shopping-bag"></i>
          <h3>Your cart is empty</h3>
          <p>Add products from the catalog or your wishlist to see them here.</p>
          <a href="products.html" class="btn btn-primary" style="margin-top: 18px;">Browse Products</a>
        </div>
      </div>

      <div class="cart-summary">
        <h3 style="margin-bottom: 20px;">Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="cart-subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping estimate</span>
          <span id="cart-shipping">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Tax estimate</span>
          <span id="cart-tax">$0.00</span>
        </div>
        
        <div class="summary-total">
          <span>Total</span>
          <span id="cart-total">$0.00</span>
        </div>
        
        <button id="checkout-btn" class="btn btn-primary" style="width: 100%; margin-top: 30px; font-size: 18px;">Proceed to Checkout</button>
      </div>
    </div>
  </main>

  <script src="scripts/main.js"></script>
</body>
</html>
