<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Registration - AmazeCart</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles/main.css">
  <style>
    /* Specific styles for login forms */
    .auth-container {
      max-width: 500px;
      margin: 60px auto;
      background: var(--surface-color);
      padding: 40px;
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }
    
    .auth-tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--border-color);
    }
    
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
    }
    
    .auth-tab.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-color);
      color: var(--text-primary);
      font-family: inherit;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    
    /* Custom Validation Error Styles */
    .input-error {
      border-color: var(--error-color) !important;
      background-color: rgba(239, 68, 68, 0.05) !important;
    }
    
    .custom-error-msg {
      color: var(--error-color);
      font-size: 12px;
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .custom-error-msg::before {
      content: '\f071';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
    }
    
    .form-success-msg {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success-color);
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
  </style>
</head>
<body>

  <!-- Header (Simplified for Login) -->
  <header>
    <div class="container top-bar" style="justify-content: center;">
      <a href="index.html" class="logo">
        <i class="fas fa-shopping-cart"></i>
        <span>AmazeCart</span>
      </a>
    </div>
  </header>

  <main class="container">
    <div class="auth-container">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
        <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
      </div>

      <!-- Login Form (with Custom JS Validation disabled HTML5) -->
      <form id="form-login" class="auth-form active custom-validate" novalidate>
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
      </form>

      <!-- Registration Form -->
      <form id="form-register" class="auth-form custom-validate" novalidate>
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password" required placeholder="••••••••">
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" name="confirm_password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>

    </div>
  </main>

  <script src="scripts/validation.js"></script>
  <script>
    // Simple inline logic for switching tabs
    function switchTab(tab) {
      document.getElementById('tab-login').classList.remove('active');
      document.getElementById('tab-register').classList.remove('active');
      document.getElementById('form-login').classList.remove('active');
      document.getElementById('form-register').classList.remove('active');

      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('form-' + tab).classList.add('active');
    }
  </script>
</body>
</html>
